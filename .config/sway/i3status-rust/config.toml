icons_format = "{icon}"

[theme]
theme = "plain"

[theme.overrides]
idle_bg = "#000000"
idle_fg = "#ffffff"

[icons]
icons = "awesome4"
#[icons.overrides]
#bat = ["|E|", "|_|", "|=|", "|F|"]
#bat_charging = "|^| "

[[block]]
block = "memory"

[[block]]
block = "disk_space"
path = "/"
info_type = "available"
alert_unit = "GB"
interval = 20
warning = 20.0
alert = 10.0
format = " $icon root: $available.eng(w:2) "

#[[block]]
#block = "memory"
#format = " $icon $mem_total_used_percents.eng(w:2) "
#format_alt = " $icon_swap $swap_used_percents.eng(w:2) "

[[block]]
block = "cpu"
info_cpu = 20
warning_cpu = 50
critical_cpu = 90


[[block]]
block = "backlight"
missing_format = ""

[[block]]
block = "sound"

[[block]]
block = "bluetooth"

[[block.click]]
button = "left"
cmd = "pavucontrol"

#[[block]]
#block = "battery"
#format = " $percentage {$time_remaining.dur(hms:true, min_unit:m) |}"
#device = "DisplayDevice"
#driver = "upower"

[[block]]
block = "time"
interval = 5
format = " $timestamp.datetime(f:'%a %d/%m %R') "
