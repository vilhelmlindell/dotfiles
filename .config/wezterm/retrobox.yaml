scheme: "Retrobox"
author: "Vilhelm Lindell"

base00: "1c1c1c"  # Default Background
base01: "3c3836"  # Lighter Background (Used for status bars, line number, etc.)
base02: "504945"  # Selection Background
base03: "928374"  # Comments, Invisibles, Line Highlighting
base04: "a89984"  # Dark Foreground (Used for status bars)
base05: "ebdbb2"  # Default Foreground, Caret, Delimiters, Operators
base06: "fbf1c7"  # Light Foreground (Rarely used)
base07: "ffffff"  # Light Background (Rarely used)

base08: "fb4934"  # Red (Variables, XML Tags, Markup Link Text, Deleted)
base09: "fe8019"  # Orange (Integers, Boolean, Constants, XML Attributes, Markup Link Url)
base0A: "fabd2f"  # Yellow (Classes, Markup Bold, Search Text Background)
base0B: "b8bb26"  # Green (Strings, Inherited Class, Markup Code, Inserted)
base0C: "8ec07c"  # Aqua/Cyan (Support, Regular Expressions, Escape Characters, Markup Quotes)
base0D: "83a598"  # Blue (Functions, Methods, Attribute IDs, Headings)
base0E: "d3869b"  # Purple/Magenta (Keywords, Storage, Selector, Markup Italic, Diff Changed)
base0F: "cc241d"  # Dark Red (Deprecated, Opening/Closing Embedded Language Tags)
