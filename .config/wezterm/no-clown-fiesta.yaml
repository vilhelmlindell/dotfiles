scheme: "No Clown Fiesta"
author: "Vilhelm Lindell"

base00: "000000"  # Default Background
base01: "171717"  # Lighter Background (Used for status bars, line number, etc.)
base02: "202020"  # Selection Background
base03: "373737"  # Comments, Invisibles, Line Highlighting
base04: "727272"  # Dark Foreground (Used for status bars)
base05: "E1E1E1"  # Default Foreground, Caret, Delimiters, Operators
base06: "AFAFAF"  # Light Foreground (Rarely used)
base07: "FFFFFF"  # Light Background (Rarely used)

base08: "B46958"  # Red (Variables, XML Tags, Markup Link Text, Deleted)
base09: "FFA557"  # Orange (Integers, Boolean, Constants, XML Attributes, Markup Link Url)
base0A: "F4BF75"  # Yellow (Classes, Markup Bold, Search Text Background)
base0B: "90A959"  # Green (Strings, Inherited Class, Markup Code, Inserted)
base0C: "88AFA2"  # Aqua/Cyan (Support, Regular Expressions, Escape Characters, Markup Quotes)
base0D: "BAD7FF"  # Blue (Functions, Methods, Attribute IDs, Headings)
base0E: "AA749F"  # Purple/Magenta (Keywords, Storage, Selector, Markup Italic, Diff Changed)
base0F: "984936"  # Dark Red (Deprecated, Opening/Closing Embedded Language Tags)
